name: Update AltStore Source
on:
  workflow_run:
    workflows: ["Xcode - Build"] # Name of your build workflow
    types: [completed]
  workflow_dispatch:

jobs:
  update-source:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Prepare metadata
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "COMMIT_MSG=Manual source refresh" >> $GITHUB_ENV
            echo "GITHUB_SHA=${{ github.sha }}" >> $GITHUB_ENV
          else
            echo "COMMIT_MSG=${{ github.event.workflow_run.head_commit.message }}" >> $GITHUB_ENV
            echo "GITHUB_SHA=${{ github.event.workflow_run.head_commit.id }}" >> $GITHUB_ENV
          fi

      - name: Update apps.json from nightly release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python .github/update_json.py

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/apps.json
          git diff --cached --quiet && exit 0
          git commit -m "Update apps.json for nightly build"
          git push
