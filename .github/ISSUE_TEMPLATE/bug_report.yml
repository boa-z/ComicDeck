name: Bug Report
description: Report a bug
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report! Before you continue filling out the report, please **[read our FAQ](docs/FAQ.md) and [search in GitHub Issues](https://github.com/ComicDeck/ComicDeck/issues) for the bug you are experiencing.**

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: What is the bug and how did you discover it?
      placeholder: Please be concise with your description.
    validations:
      required: true
  - type: textarea
    id: how-to-reproduce
    attributes:
      label: Instructions to reproduce
      description: Please include consistent instructions for reproducing the bug.
    validations:
      required: true
  - type: input
    id: app-version
    attributes:
      label: What version of ComicDeck and iOS are you using?
      description: To retrieve ComicDeck version, go to Settings -> About.
    validations:
      required: true
  - type: checkboxes
    attributes:
      label: Verify steps
      options:
        - label: I downloaded ComicDeck from releases / actions section.
        - label: I have the latest ComicDeck.
        - label: I installed ComicDeck through AltStore/SideStore/TrollStore or I'm confident that I signed ComicDeck correctly with all required entitlements.
    validations:
      required: true
  - type: textarea
    id: crash-log
    attributes:
      label: Crash Log
      description: If a crash happened, please upload the crash log in iOS settings - Privacy Security - Analytics Improvements - Analytics Data - Search ComicDeck. **Do not copy and paste.** Instead, please change .ips to .txt and upload it.
  - type: textarea
    id: other-info
    attributes:
      label: Other info
      description: If you have any other info that might be useful, or if you found a workaround, please put it here.
